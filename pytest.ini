[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    unit: unit tests
    integration: integration tests
    api: API tests
    bot: bot tests
    panel: panel tests
    e2e: end-to-end tests
    slow: slow running tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S 