version: '3.8'

services:
  # --- API Service / سرویس API ---
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: moonvpn_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/var/log/moonvpn
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - moonvpn_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- Bot Service / سرویس ربات ---
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: moonvpn_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/var/log/moonvpn
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - moonvpn_network
    healthcheck:
      test: ["CMD", "python", "-c", "from bot.utils.health import check_health; check_health()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- Database Service / سرویس پایگاه داده ---
  db:
    image: mysql:8.0
    container_name: moonvpn_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: moonvpn_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - moonvpn_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    command: --default-authentication-plugin=mysql_native_password
            --character-set-server=utf8mb4
            --collation-server=utf8mb4_unicode_ci
            --explicit_defaults_for_timestamp=1
            --default-time-zone='+00:00'

  # --- Cache Service / سرویس کش ---
  redis:
    image: redis:6.2-alpine
    container_name: moonvpn_redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - moonvpn_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # --- Database Management / مدیریت پایگاه داده ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: moonvpn_phpmyadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT}:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moonvpn_network

# --- Volumes / فضاهای ذخیره‌سازی ---
volumes:
  mysql_data:
    name: moonvpn_mysql_data
  redis_data:
    name: moonvpn_redis_data

# --- Networks / شبکه‌ها ---
networks:
  moonvpn_network:
    name: moonvpn_network
    driver: bridge
