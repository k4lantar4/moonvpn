version: '3.8'

services:
  api:
    build:
      context: ../../
      dockerfile: docker/staging/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=staging
      - DATABASE_URL=postgresql://moonvpn:moonvpn@db:5432/moonvpn
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  bot:
    build:
      context: ../../
      dockerfile: docker/staging/Dockerfile
    environment:
      - ENVIRONMENT=staging
      - DATABASE_URL=postgresql://moonvpn:moonvpn@db:5432/moonvpn
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: python -m app.bot.main
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=moonvpn
      - POSTGRES_PASSWORD=moonvpn
      - POSTGRES_DB=moonvpn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:6
    volumes:
      - redis_data:/data
    deploy:
      placement:
        constraints:
          - node.role == manager

  prometheus:
    image: prom/prometheus
    volumes:
      - ../../monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    deploy:
      placement:
        constraints:
          - node.role == manager

  grafana:
    image: grafana/grafana
    volumes:
      - ../../monitoring/grafana:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      placement:
        constraints:
          - node.role == manager

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../nginx/staging:/etc/nginx/conf.d
      - ../../nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: 