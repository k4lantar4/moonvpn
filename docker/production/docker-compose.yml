version: '3.8'

services:
  api:
    build:
      context: ../../
      dockerfile: docker/production/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://moonvpn:moonvpn@db:5432/moonvpn
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    deploy:
      replicas: 4
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  bot:
    build:
      context: ../../
      dockerfile: docker/production/Dockerfile
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://moonvpn:moonvpn@db:5432/moonvpn
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: python -m app.bot.main
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=moonvpn
      - POSTGRES_PASSWORD=moonvpn
      - POSTGRES_DB=moonvpn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:6
    volumes:
      - redis_data:/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  prometheus:
    image: prom/prometheus
    volumes:
      - ../../monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  grafana:
    image: grafana/grafana
    volumes:
      - ../../monitoring/grafana:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../nginx/production:/etc/nginx/conf.d
      - ../../nginx/ssl:/etc/nginx/ssl
      - ../../nginx/logs:/var/log/nginx
    depends_on:
      - api
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  backup:
    image: postgres:13
    volumes:
      - ../../backups:/backups
      - postgres_data:/var/lib/postgresql/data:ro
    command: |
      /bin/bash -c '
        while true; do
          pg_dump -h db -U moonvpn moonvpn > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql
          find /backups -type f -mtime +7 -delete
          sleep 86400
        done
      '
    environment:
      - POSTGRES_PASSWORD=moonvpn
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: 